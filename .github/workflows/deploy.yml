name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /www/wwwroot/crm.taki.vn
            # Pre-pull deploy.sh BEFORE invoking it. Without this, bash
            # streams the on-disk deploy.sh into memory before the script's
            # own `git pull` step runs - so changes to deploy.sh itself
            # only take effect on the deploy AFTER the one that pushes them.
            git config --global --add safe.directory /www/wwwroot/crm.taki.vn
            git fetch origin master
            git reset --hard origin/master
            bash scripts/deploy.sh
