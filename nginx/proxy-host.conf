# Nginx Proxy Manager — Custom Nginx Configuration
# Paste this into "Advanced" tab when creating the proxy host in NPM UI
# Domain: crm.yourdomain.com → crm-web:3011

client_max_body_size 10M;

# API requests → NestJS
location /api/ {
    proxy_pass http://127.0.0.1:3010;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Uploaded files → NestJS
location /files/ {
    proxy_pass http://127.0.0.1:3010;
    proxy_set_header Host $host;
}

# Health check
location /health {
    proxy_pass http://127.0.0.1:3010/api/v1/health;
}
